<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeepClean — Abrir App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #052659;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .logo {
      font-size: 48px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    p {
      font-size: 16px;
      opacity: 0.8;
      margin-bottom: 32px;
      max-width: 320px;
      line-height: 1.5;
    }
    .btn {
      display: block;
      background: #1565C0;
      color: white;
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
      width: 100%;
      max-width: 320px;
      border: none;
      cursor: pointer;
    }
    .btn-secondary {
      background: transparent;
      border: 2px solid rgba(255,255,255,0.4);
      font-size: 15px;
      padding: 12px 24px;
    }
    .steps {
      margin-top: 40px;
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 20px;
      max-width: 320px;
      text-align: left;
    }
    .steps h3 {
      font-size: 14px;
      opacity: 0.6;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }
    .step {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }
    .step-num {
      background: #1565C0;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .step-text {
      font-size: 14px;
      line-height: 1.4;
      opacity: 0.9;
    }
    .status {
      margin-top: 20px;
      font-size: 13px;
      opacity: 0.5;
    }
  </style>
</head>
<body>

  <div class="logo">🧹</div>
  <h1>DeepClean</h1>
  <p>Plataforma de gestión de limpieza profesional</p>

  <a class="btn" id="openBtn" href="#">Abrir DeepClean</a>
  <a class="btn btn-secondary" id="storeBtn" href="#">Descargar Expo Go</a>

  <div class="steps">
    <h3>¿Primera vez?</h3>
    <div class="step">
      <div class="step-num">1</div>
      <div class="step-text">Descarga <strong>Expo Go</strong> desde el App Store o Play Store</div>
    </div>
    <div class="step">
      <div class="step-num">2</div>
      <div class="step-text">Regresa a este link y toca <strong>"Abrir DeepClean"</strong></div>
    </div>
    <div class="step">
      <div class="step-num">3</div>
      <div class="step-text">Ingresa con tu usuario y contraseña</div>
    </div>
  </div>

  <div class="status" id="status">Detectando dispositivo...</div>

  <script>
    // ⚠️ CAMBIA ESTA URL cada vez que reinicias expo start --tunnel
    const EXPO_URL = 'exp://dgc2xco-5deepcorp_dev-8081.exp.direct';

    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    const isAndroid = /Android/.test(navigator.userAgent);

    const iosStore = 'https://apps.apple.com/app/expo-go/id982107779';
    const androidStore = 'https://play.google.com/store/apps/details?id=host.exp.exponent';
    const storeUrl = isIOS ? iosStore : androidStore;

    document.getElementById('openBtn').href = EXPO_URL;
    document.getElementById('storeBtn').href = storeUrl;

    const statusEl = document.getElementById('status');
    if (isIOS) statusEl.textContent = 'iPhone / iPad detectado';
    else if (isAndroid) statusEl.textContent = 'Android detectado';
    else statusEl.textContent = 'Abre este link desde tu celular';

    // Al tocar "Abrir DeepClean", intenta abrir Expo Go
    // Si no está instalado, redirige a la tienda después de 2s
    document.getElementById('openBtn').addEventListener('click', function(e) {
      e.preventDefault();
      window.location.href = EXPO_URL;
      setTimeout(() => {
        window.location.href = storeUrl;
      }, 2000);
    });
  </script>

</body>
</html>
